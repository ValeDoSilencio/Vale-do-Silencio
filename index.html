<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regras RP</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    header {
      background: #222;
      padding: 20px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .rule {
      background: #1c1c1c;
      margin: 10px 0;
      padding: 15px;
      border-left: 4px solid #4caf50;
    }

    .rule h3 {
      margin: 0 0 5px;
      color: #4caf50;
    }
  </style>
</head>

<body>

<header>
  📜 Regras Gerais RP
</header>

<div class="container">

  <div class="rule"><h3>Prioridade RP</h3><p>Priorizar sempre o Roleplay.</p></div>

  <div class="rule"><h3>Microfone</h3><p>Uso obrigatório de microfone.</p></div>

  <div class="rule"><h3>Sense RP</h3><p>Agir com bom senso em todas as situações.</p></div>

  <div class="rule"><h3>Fear RP</h3><p>Demonstrar medo em situações de perigo.</p></div>

  <div class="rule"><h3>Pain RP</h3><p>Reagir a dor de forma realista.</p></div>

  <div class="rule"><h3>NLR</h3><p>Não lembrar da morte nem voltar ao local.</p></div>

</div>

</body>
</html>
