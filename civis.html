<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vale do Silêncio RP - Civis</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: #111;
    height: 100vh;
    padding: 20px;
    position: fixed;
    border-right: 1px solid #222;
}

.sidebar h2 {
    color: cyan;
    font-size: 18px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
}

.sidebar a:hover {
    background: #1c1c1c;
    color: cyan;
}

/* CONTENT */
.content {
    margin-left: 260px;
    padding: 30px;
    max-width: 900px;
}

h2 {
    border-left: 4px solid cyan;
    padding-left: 10px;
    margin-top: 30px;
}

.card {
    background: #161616;
    padding: 15px 20px;
    border-radius: 10px;
    margin-top: 10px;
    border: 1px solid #222;
}

/* ACCORDION */
.acc summary {
    cursor: pointer;
    font-size: 16px;
    padding: 10px;
    color: white;
    list-style: none;
}

.acc summary:hover {
    color: cyan;
}

.acc ul {
    margin-top: 10px;
    line-height: 1.8;
    padding-left: 20px;
}

.acc summary::-webkit-details-marker {
    display: none;
}

/* MOBILE */
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }

    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
    }

    .content {
        margin-left: 0;
    }
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📜 Vale do Silêncio RP</h2>

    <a href="index.html">⬅ Home</a>
    <a href="#civis">👥 Civis</a>
</div>

<!-- CONTENT -->
<div class="content">

<h2>📜 Regras Oficiais</h2>

<h2 id="civis">👥 Civis</h2>

<div class="card">
<details class="acc">
    <summary>👥 Civis Organizados</summary>
    <ul>
        <li>Civis organizados podem ter no máximo 8 membros.</li>
        <li>É proibido civis organizados apresentarem-se ou agirem como organização.</li>
        <li>É proibido civis organizados utilizarem mochilas como meio de identificação.</li>
    </ul>
</details>
</div>

</div>

</body>
</html>
